services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: birdsight
      POSTGRES_USER: birdsight_user
      POSTGRES_PASSWORD: birdsight_pass
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birdsight_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: birdsight_minio
      MINIO_ROOT_PASSWORD: birdsight_minio_secret
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 birdsight_minio birdsight_minio_secret &&
        mc mb --ignore-existing local/avatars &&
        mc anonymous set download local/avatars
      "

volumes:
  db-data:
    name: birdsight-db-data
  minio-data:
    name: birdsight-minio-data

