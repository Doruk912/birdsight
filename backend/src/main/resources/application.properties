spring.application.name=BirdSight

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/birdsight}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:birdsight_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:birdsight_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000
app.jwt.refresh-cookie-name=refresh_token

# MinIO Configuration
app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:birdsight_minio}
app.minio.secret-key=${MINIO_SECRET_KEY:birdsight_minio_secret}
app.minio.bucket-name=${MINIO_BUCKET_NAME:images}

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=55MB

# ML Service Configuration
app.ml-service.url=${ML_SERVICE_URL:http://localhost:8000}
app.ml-service.timeout=30000

